name: Build SDK Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  # 替换为 qualcommax/ipq60xx 架构的 ImmortalWrt 25.12.0-rc2 SDK
  APK_SDK_URL: https://downloads.immortalwrt.org/releases/25.12.0-rc2/targets/qualcommax/ipq60xx/immortalwrt-sdk-25.12.0-rc2-qualcommax-ipq60xx_gcc-14.3.0_musl.Linux-x86_64.tar.zst

jobs:
  unit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit validations
        run: ./tests/run.sh unit

  release:
    needs: unit
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches code version
        id: meta
        run: |
          code_version="$(sh ./scripts/release-version.sh)"
          expected_tag="v${code_version}"
          if [ "${GITHUB_REF_NAME}" != "$expected_tag" ]; then
            printf '%s\n' "error: release tag ${GITHUB_REF_NAME} does not match code version ${code_version}" >&2
            exit 1
          fi
          printf 'code_version=%s\n' "$code_version" >> "$GITHUB_OUTPUT"

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip wget xz-utils zlib1g-dev zstd

      - name: Download public SDKs
        run: |
          mkdir -p "$RUNNER_TEMP/sdk-apk-base"
          curl -L "$APK_SDK_URL" -o "$RUNNER_TEMP/sdk-apk-base/sdk.tar.zst"
          
          # 移除了 SHA256 校验，因为更换了 SDK URL。如果需要可以自行添加验证逻辑
          # printf '%s  %s\n' "$APK_SDK_SHA256" "$RUNNER_TEMP/sdk-apk-base/sdk.tar.zst" | sha256sum -c -
          
          tar --zstd -xf "$RUNNER_TEMP/sdk-apk-base/sdk.tar.zst" -C "$RUNNER_TEMP/sdk-apk-base" --strip-components=1

      - name: Build SDK packages
        run: |
          umask 022

          run_build() {
            name=$1
            sdk_dir=$2
            enable_bpf=$3
            sdk_release=$4
            base_feed_ref=${5:-}
            log_file="$RUNNER_TEMP/${name}.log"
            (
              ENABLE_BPF="$enable_bpf" SDK_RELEASE="$sdk_release" SDK_BASE_FEED_REF="$base_feed_ref" SDK_DIR="$sdk_dir" ./scripts/build-sdk.sh all
            ) > "$log_file" 2>&1 &
            printf '%s %s %s\n' "$!" "$name" "$log_file" >> "$RUNNER_TEMP/build-pids.txt"
          }

          : > "$RUNNER_TEMP/build-pids.txt"
          # 只编译 apk-base，禁用 bpf (enable_bpf=0)
          run_build apk-base "$RUNNER_TEMP/sdk-apk-base" 0 25.12

          status=0
          while read -r pid name log_file; do
            if wait "$pid"; then
              printf '%s\n' "build ok: $name"
            else
              rc=$?
              printf '%s\n' "build failed: $name exit=$rc" >&2
              sed 's/^/  /' "$log_file" >&2
              status=1
            fi
          done < "$RUNNER_TEMP/build-pids.txt"
          exit "$status"

      - name: Collect release files
        id: release_files
        run: |
          code_version="${{ steps.meta.outputs.code_version }}"
          release_dir="$RUNNER_TEMP/release/files"
          file_list="$RUNNER_TEMP/release/files.txt"
          mkdir -p "$release_dir"
          : > "$file_list"

          collect_one() {
            sdk_dir=$1
            pattern=$2
            found=0
            for file in "$sdk_dir"/bin/packages/*/lanspeed/$pattern "$sdk_dir"/bin/packages/*/base/$pattern; do
              [ -f "$file" ] || continue
              cp "$file" "$release_dir/"
              printf '%s/%s\n' "$release_dir" "$(basename "$file")" >> "$file_list"
              found=1
            done
            if [ "$found" = 0 ]; then
              printf '%s\n' "error: missing release package $pattern in $sdk_dir/bin" >&2
              exit 1
            fi
          }

          # 仅收集 apk，不收集 bpf 和 ipk
          collect_one "$RUNNER_TEMP/sdk-apk-base" "lanspeedd-${code_version}.apk"
          collect_one "$RUNNER_TEMP/sdk-apk-base" "luci-app-lanspeed-${code_version}.apk"
          # 收集中文语言包 (前提是你的插件源码里包含标准的 po/zh_Hans 或者 po/zh-cn 目录，OpenWrt 编译时会自动生成该包)
          collect_one "$RUNNER_TEMP/sdk-apk-base" "luci-i18n-lanspeed-zh-cn-${code_version}.apk"

          if [ ! -s "$file_list" ]; then
            printf '%s\n' "error: no release files were collected" >&2
            exit 1
          fi
          {
            printf 'files<<EOF\n'
            cat "$file_list"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Remove previous release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "$GITHUB_REF_NAME" "$asset" --yes
            done
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          name: ${{ steps.meta.outputs.code_version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: ${{ steps.release_files.outputs.files }}
